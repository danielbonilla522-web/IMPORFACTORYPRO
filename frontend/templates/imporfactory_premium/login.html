<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Iniciar sesión · IMPORFACTORY OS</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-0:#070b18; --card:#0f1730; --card-2:#0b1226;
  --border:rgba(255,255,255,.08); --border-2:rgba(0,191,255,.22);
  --cyan:#00bfff; --cyan-2:#06b6d4; --primary:#2563eb;
  --text:#eef2f9; --dim:#94a3b8; --soft:#64748b; --danger:#ef4444;
}
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,system-ui,sans-serif;
  background:radial-gradient(circle at 25% 0%, rgba(37,99,235,.22) 0%, transparent 45%),
             radial-gradient(circle at 90% 95%, rgba(0,191,255,.16) 0%, transparent 40%), var(--bg-0);
  color:var(--text); min-height:100vh; display:grid; place-items:center; padding:24px;
}
.box{width:100%;max-width:400px}
.brand{text-align:center;margin-bottom:28px}
.brand-eyebrow{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--cyan);font-weight:800}
.brand-title{font-family:-apple-system,'Inter','Segoe UI',Roboto,system-ui,sans-serif;font-size:34px;font-weight:900;letter-spacing:-.02em;line-height:1;margin-top:8px;
  background:linear-gradient(135deg,#fff,#9cc4ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.card{background:linear-gradient(180deg,var(--card),var(--card-2));border:1px solid var(--border-2);border-radius:18px;padding:32px 28px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
.card h1{font-size:19px;font-weight:800;margin-bottom:4px}
.card p.sub{font-size:13px;color:var(--dim);margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;margin-bottom:7px;color:var(--text)}
.field input{width:100%;padding:12px 14px;font-size:14px;background:var(--bg-0);border:1px solid var(--border);border-radius:10px;color:var(--text);outline:none;transition:all .15s;font-family:inherit}
.field input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,191,255,.16)}
.field input::placeholder{color:var(--soft)}
.pwd-wrap{position:relative}
.pwd-wrap button{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--soft);cursor:pointer;font-size:12px;font-weight:700;padding:4px}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--cyan-2));color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:800;letter-spacing:.3px;cursor:pointer;transition:all .2s;margin-top:8px;display:inline-flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 10px 26px rgba(37,99,235,.35)}
.btn:hover{transform:translateY(-1px);box-shadow:0 14px 32px rgba(37,99,235,.5)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.err{display:none;padding:11px 14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;color:#fca5a5;font-size:13px;margin-bottom:16px;font-weight:500}
.err.show{display:block}
.spin{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.foot{text-align:center;font-size:11px;color:var(--soft);margin-top:22px}
</style>
</head>
<body>
  <div class="box">
    <div class="brand">
      <div class="brand-eyebrow">Sistema de Gestión Premium</div>
      <div class="brand-title">IMPORFACTORY OS</div>
    </div>
    <div class="card">
      <h1>Iniciar sesión</h1>
      <p class="sub">Entrá con tu cuenta del equipo GRUPO IMPOR.</p>
      <div class="err" id="err"></div>
      <form id="form">
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="tu@grupoimpor.com" autocomplete="username" autofocus>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <div class="pwd-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            <button type="button" id="toggle">Ver</button>
          </div>
        </div>
        <button type="submit" class="btn" id="submit"><span id="lbl">Entrar →</span></button>
      </form>
    </div>
    <div class="foot">GRUPO IMPOR · Daniel Bonilla · <span id="y"></span></div>
  </div>

<script>
document.getElementById("y").textContent = new Date().getFullYear();
const params = new URLSearchParams(location.search);
const redirect = params.get("redirect") || "/dashboard";

const $ = s => document.querySelector(s);
$("#toggle").addEventListener("click", () => {
  const p = $("#password");
  p.type = p.type === "password" ? "text" : "password";
  $("#toggle").textContent = p.type === "password" ? "Ver" : "Ocultar";
});

function showErr(m){ const e=$("#err"); e.textContent=m; e.classList.add("show"); }

$("#form").addEventListener("submit", async e => {
  e.preventDefault();
  $("#err").classList.remove("show");
  const email = $("#email").value.trim();
  const password = $("#password").value;
  if(!email || !password){ showErr("Completá email y contraseña"); return; }
  const btn=$("#submit"), lbl=$("#lbl");
  btn.disabled=true; lbl.innerHTML='<span class="spin"></span>';
  try{
    const r = await fetch("/api/auth/login", {
      method:"POST", credentials:"include", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({email, password}),
    });
    if(!r.ok){
      const d = await r.json().catch(()=>({}));
      throw new Error(d.detail || (r.status===401?"Email o contraseña incorrectos":"Error "+r.status));
    }
    lbl.textContent = "✓ Entrando…";
    location.href = redirect.startsWith("/") ? redirect : "/dashboard";
  }catch(err){
    showErr(err.message);
    btn.disabled=false; lbl.textContent="Entrar →";
  }
});
</script>
</body>
</html>
